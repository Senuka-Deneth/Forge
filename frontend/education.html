<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Education - Forge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── TOKENS ─── */
    :root {
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-ui: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }
    [data-theme="dark"] {
      --bg-base:    hsl(220, 14%, 7%);
      --bg-surface: hsl(220, 12%, 10%);
      --bg-raised:  hsl(220, 11%, 13%);
      --bg-overlay: hsl(220, 10%, 17%);
      --accent-primary: hsl(215, 30%, 58%);
      --accent-hover:   hsl(215, 32%, 64%);
      --accent-subtle:  hsla(215, 30%, 58%, 0.10);
      --text-primary:   hsl(218, 14%, 90%);
      --text-secondary: hsl(218, 10%, 62%);
      --text-muted:     hsl(218, 8%, 44%);
      --text-inverse:   hsl(220, 14%, 7%);
      --color-bull:  hsl(152, 38%, 50%);
      --color-bear:  hsl(4, 56%, 58%);
      --color-flat:  hsl(220, 12%, 50%);
      --border-subtle: hsla(218, 20%, 60%, 0.08);
      --border-medium: hsla(218, 20%, 60%, 0.16);
    }
    [data-theme="light"] {
      --bg-base:    hsl(220, 20%, 98%);
      --bg-surface: hsl(0, 0%, 100%);
      --bg-raised:  hsl(220, 16%, 95%);
      --bg-overlay: hsl(220, 14%, 91%);
      --accent-primary: hsl(215, 32%, 40%);
      --accent-hover:   hsl(215, 34%, 34%);
      --accent-subtle:  hsla(215, 32%, 40%, 0.09);
      --text-primary:   hsl(220, 18%, 12%);
      --text-secondary: hsl(219, 12%, 38%);
      --text-muted:     hsl(219, 9%, 52%);
      --text-inverse:   hsl(220, 20%, 98%);
      --color-bull:  hsl(152, 45%, 32%);
      --color-bear:  hsl(4, 55%, 42%);
      --color-flat:  hsl(220, 12%, 50%);
      --border-subtle: hsla(220, 25%, 20%, 0.09);
      --border-medium: hsla(220, 25%, 20%, 0.16);
    }

    /* ─── RESET ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--font-ui);
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    a { text-decoration: none; color: inherit; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 2px; }

    /* ─── SHELL ─── */
    .edu-shell {
      display: flex;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── APP NAV SIDEBAR (matches dashboard) ─── */
    .app-sidebar {
      width: 240px;
      min-width: 240px;
      height: 100vh;
      background: var(--bg-base);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      overflow-y: hidden;
      flex-shrink: 0;
      z-index: 10;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .app-sidebar.collapsed {
      width: 72px;
      min-width: 72px;
    }

    .app-sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px 32px;
      white-space: nowrap;
    }

    .app-sidebar.collapsed .app-sidebar-header {
      padding: 0 16px 32px;
      justify-content: center;
    }

    .app-sidebar-toggle-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      border-radius: 8px;
      color: var(--text-secondary);
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .app-sidebar-toggle-btn:hover {
      background: var(--bg-raised);
      color: var(--text-primary);
    }

    .hamburger-line {
      transition: transform 0.3s ease, opacity 0.3s ease;
      transform-origin: center;
    }

    .app-sidebar-toggle-btn.open .line-1 { transform: translateY(4px) rotate(45deg); }
    .app-sidebar-toggle-btn.open .line-2 { opacity: 0; }
    .app-sidebar-toggle-btn.open .line-3 { transform: translateY(-4px) rotate(-45deg); }

    .app-sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
    }

    .app-sidebar.collapsed .app-sidebar-brand {
      display: none;
    }

    .app-brand-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--accent-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .app-brand-icon svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: var(--accent-primary);
      stroke-width: 1.5;
    }

    .app-brand-name {
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 15px;
      color: var(--text-primary);
    }

    .app-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 12px;
    }

    .app-nav-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 12px;
      color: var(--text-secondary);
      font-size: 11px;
      font-family: var(--font-ui);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-radius: 4px;
      white-space: nowrap;
    }

    .app-sidebar.collapsed .app-nav-item {
      justify-content: center;
      padding: 12px 0;
    }

    .app-sidebar.collapsed .app-nav-item span {
      display: none;
    }

    .app-nav-item:hover {
      background: var(--bg-raised);
      color: var(--text-primary);
    }

    .app-nav-item.active {
      background: var(--accent-subtle);
      color: var(--text-primary);
    }

    .app-nav-item.active svg {
      stroke: var(--accent-primary);
    }

    .app-nav-item svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .app-sidebar-footer {
      margin-top: auto;
      padding: 24px 12px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .app-sidebar.collapsed .app-sidebar-footer {
      align-items: center;
    }

    .app-sidebar.collapsed .app-theme-btn span,
    .app-sidebar.collapsed .app-logout-btn span {
      display: none;
    }

    .app-sidebar.collapsed .app-theme-btn {
      padding: 10px;
    }

    .app-theme-btn {
      background: transparent;
      border: none;
      font-family: var(--font-ui);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px 0;
      text-align: left;
      transition: color 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .app-theme-btn:hover { color: var(--text-primary); }

    .app-logout-btn {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px;
      font-family: var(--font-ui);
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      transition: all 160ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
    }

    .app-logout-btn:hover {
      background: var(--bg-raised);
      color: var(--text-primary);
    }

    .app-logout-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
    }

    /* ─── PAGE APPEAR ANIMATION ─── */
    @keyframes pageAppear {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── SIDEBAR ─── */
    .edu-sidebar {
      width: 240px;
      min-width: 240px;
      height: 100vh;
      background: var(--bg-surface);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .edu-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 28px 24px 36px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .edu-brand-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .edu-brand-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: var(--accent-primary);
      stroke-width: 1.5;
    }

    .edu-brand-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .edu-brand-name {
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1;
    }

    .edu-brand-sub {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .edu-nav-wrap {
      flex: 1;
      padding: 16px 0 24px;
    }

    .edu-nav-group {
      margin-bottom: 8px;
    }

    .edu-group-label {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 16px 20px 8px;
      display: block;
    }

    .edu-nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      font-size: 13px;
      font-family: var(--font-ui);
      font-weight: 450;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.16s ease;
      border-left: 2px solid transparent;
    }

    .edu-nav-link:hover {
      color: var(--text-primary);
      background: var(--bg-raised);
    }

    .edu-nav-link.active {
      color: var(--text-primary);
      border-left-color: var(--accent-primary);
      background: var(--bg-raised);
      font-weight: 500;
      padding-left: 18px;
    }

    .edu-nav-link svg {
      width: 15px;
      height: 15px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .edu-nav-link-text {
      font-size: 13px;
    }

    /* ─── MAIN CONTENT ─── */
    .edu-main {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      min-width: 0;
      animation: pageAppear 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* ─── TOPBAR ─── */
    .edu-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 56px;
      min-height: 56px;
      background: var(--bg-base);
      border-bottom: 1px solid var(--border-subtle);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .edu-breadcrumb {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .edu-breadcrumb span {
      color: var(--text-secondary);
    }

    .edu-search {
      background: var(--bg-raised);
      border: 1px solid transparent;
      border-bottom: 1px solid var(--border-medium);
      border-radius: 4px 4px 0 0;
      padding: 8px 14px;
      font-size: 13px;
      font-family: var(--font-ui);
      color: var(--text-primary);
      width: 200px;
      outline: none;
      transition: border-bottom-color 0.18s;
    }
    .edu-search:focus { border-bottom-color: var(--accent-primary); }
    .edu-search::placeholder { color: var(--text-muted); }

    /* ─── CONTENT AREA ─── */
    .edu-content-wrap {
      padding: 48px 56px 80px;
      max-width: 860px;
    }

    /* ─── HERO INTRO ─── */
    .edu-hero {
      margin-bottom: 56px;
      padding-bottom: 40px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .edu-hero-eyebrow {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-primary);
      margin-bottom: 12px;
    }

    .edu-hero-title {
      font-family: var(--font-display);
      font-size: 52px;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 20px;
    }

    .edu-hero-title i {
      font-style: italic;
    }

    .edu-hero-desc {
      font-family: var(--font-ui);
      font-size: 17px;
      color: var(--text-secondary);
      line-height: 1.75;
      max-width: 580px;
    }

    /* ─── SECTION ARTICLE CARDS ─── */
    .edu-section {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 40px;
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .edu-section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .edu-section-meta {
      margin-bottom: 20px;
    }

    .edu-section-tag {
      display: inline-flex;
      align-items: center;
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--accent-primary);
      background: var(--accent-subtle);
      padding: 4px 10px;
      border-radius: 4px;
      margin-bottom: 14px;
    }

    .edu-section-title {
      font-family: var(--font-display);
      font-size: 34px;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .edu-section-subtitle {
      font-family: var(--font-ui);
      font-size: 15px;
      color: var(--text-muted);
    }

    .edu-section-body {
      border-top: 1px solid var(--border-subtle);
      margin-top: 28px;
      padding-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .edu-block { display: block; }

    .edu-block-label {
      font-family: var(--font-ui);
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .edu-block-text {
      font-family: var(--font-ui);
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-secondary);
    }

    /* ─── VISUAL COMPONENTS ─── */
    .formula-box {
      background: var(--bg-raised);
      border: 1px solid var(--border-subtle);
      border-left: 3px solid var(--accent-primary);
      padding: 14px 18px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-primary);
      border-radius: 0 6px 6px 0;
      margin: 16px 0;
    }

    .edu-tips {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 16px;
    }

    .edu-tip {
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.6;
      padding: 12px 16px;
      border-left: 3px solid transparent;
      border-radius: 0 6px 6px 0;
      background: var(--bg-raised);
      color: var(--text-secondary);
    }
    .edu-tip.bull { border-left-color: var(--color-bull); }
    .edu-tip.bear { border-left-color: var(--color-bear); }
    .edu-tip.neutral { border-left-color: var(--color-flat); }
    .edu-tip.info { border-left-color: var(--accent-primary); }

    .scale-bar {
      display: flex;
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      overflow: hidden;
      height: 36px;
      margin: 14px 0;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
    }
    .zone { display: flex; align-items: center; justify-content: center; }
    .zone.oversold { background: hsla(158, 55%, 48%, 0.10); color: var(--color-bull); border-right: 1px solid var(--border-subtle); }
    .zone.neutral-zone { background: var(--bg-raised); color: var(--text-muted); }
    .zone.overbought { background: hsla(358, 68%, 58%, 0.10); color: var(--color-bear); border-left: 1px solid var(--border-subtle); }

    .pivot-diagram {
      display: flex;
      flex-direction: column;
      gap: 1px;
      margin: 16px 0;
      background: var(--border-subtle);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      overflow: hidden;
    }
    .pivot-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: var(--bg-raised);
      font-family: var(--font-mono);
      font-size: 13px;
    }
    .pivot-row.r3, .pivot-row.r2, .pivot-row.r1 { color: var(--color-bear); }
    .pivot-row.pp { background: var(--bg-overlay); color: var(--text-primary); font-weight: 500; font-family: var(--font-ui); }
    .pivot-row.s1, .pivot-row.s2, .pivot-row.s3 { color: var(--color-bull); }

    .macd-visual {
      height: 2px; background: var(--color-bull); position: relative; margin: 32px 0 16px;
    }
    .macd-visual .macd-bar {
      position: absolute; top: -10px; left: 20%; width: 60%; height: 2px;
      background: var(--color-bear); transform: rotate(5deg);
    }

    .conf-visual { height: 4px; background: var(--border-subtle); border-radius: 2px; margin: 16px 0 8px; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 1024px) {
      .edu-sidebar { display: none; }
      .edu-content-wrap { padding: 32px 24px 60px; }
      .edu-hero-title { font-size: 36px; }
      .edu-section-title { font-size: 26px; }
    }
    @media (max-width: 768px) {
      .app-sidebar { display: none; }
    }
  </style>
</head>
<body>
  <div class="edu-shell">

    <!-- APP NAV SIDEBAR (matches dashboard) -->
    <aside class="app-sidebar collapsed" id="app-sidebar">
      <div class="app-sidebar-header">
        <a href="welcome.html" class="app-sidebar-brand">
          <div class="app-brand-icon">
            <svg viewBox="0 0 24 24"><path d="M3 3v18h18M9 15l3-3 4 4 5-5"/></svg>
          </div>
          <span class="app-brand-name">Forge</span>
        </a>
        <button class="app-sidebar-toggle-btn" id="app-sidebar-toggle-btn" onclick="toggleSidebar()">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <line x1="3" y1="12" x2="21" y2="12" class="hamburger-line line-2" />
            <line x1="3" y1="6" x2="21" y2="6" class="hamburger-line line-1" />
            <line x1="3" y1="18" x2="21" y2="18" class="hamburger-line line-3" />
          </svg>
        </button>
      </div>

      <nav class="app-nav">
        <a class="app-nav-item" href="index.html?tab=dashboard" title="Go to Dashboard">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
          <span>Dashboard</span>
        </a>
        <a class="app-nav-item" href="index.html?tab=analysis" title="Go to Analysis">
          <svg viewBox="0 0 24 24"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path><path d="M5 3v4"></path><path d="M19 17v4"></path><path d="M3 5h4"></path><path d="M17 19h4"></path></svg>
          <span>Analysis</span>
        </a>
        <a class="app-nav-item active" href="education.html" title="Learning Center">
          <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
          <span>Learning</span>
        </a>
      </nav>

      <div class="app-sidebar-footer">
        <button class="app-theme-btn" id="app-theme-btn" onclick="toggleAppTheme()">
          <span id="app-theme-btn-text">Light Mode</span>

  <script src="education-app.js"></script>
  <script>
    // ── App Sidebar: Theme + Logout (mirrors dashboard behaviour) ──
    (function() {
      const STORAGE_KEY = 'forge_theme';
      const btnText = document.getElementById('app-theme-btn-text');

      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        document.body.setAttribute('data-theme', theme);
        localStorage.setItem(STORAGE_KEY, theme);
        if (btnText) btnText.textContent = theme === 'dark' ? 'Light Mode' : 'Dark Mode';
      }

      // Restore saved theme on load
      const saved = localStorage.getItem(STORAGE_KEY) || 'dark';
      applyTheme(saved);

      window.toggleAppTheme = function() {
        const current = document.documentElement.getAttribute('data-theme') || 'dark';
        applyTheme(current === 'dark' ? 'light' : 'dark');
      };

      window.appLogout = function() {
        localStorage.removeItem('forge_auth_token');
        localStorage.removeItem('forge_user');
        sessionStorage.removeItem('forge_auth_token');
        sessionStorage.removeItem('forge_user');
        window.location.href = 'welcome.html';
      };

      window.toggleSidebar = function() {
        const sidebar = document.getElementById('app-sidebar');
        const btn = document.getElementById('app-sidebar-toggle-btn');
        const themeIcon = document.querySelector('.theme-icon-collapsed');
        
        if (sidebar.classList.contains('collapsed')) {
          sidebar.classList.remove('collapsed');
          btn.classList.add('open');
          themeIcon.style.display = 'none';
        } else {
          sidebar.classList.add('collapsed');
          btn.classList.remove('open');
          themeIcon.style.display = 'block';
        }
      };

      // Ensure correct initial state for theme icon
      const sidebar = document.getElementById('app-sidebar');
      const themeIcon = document.querySelector('.theme-icon-collapsed');
      if (sidebar.classList.contains('collapsed') && themeIcon) {
        themeIcon.style.display = 'block';
      }
    })();
  </script>
